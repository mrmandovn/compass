name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-versions:
    name: verify versions in sync
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check all 11 version refs match VERSION + tag
        run: |
          set -euo pipefail
          V=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$V" != "$TAG" ]; then
            echo "✗ VERSION=$V does not match tag=$TAG"; exit 1
          fi

          fail=0
          check() {
            local label="$1" actual="$2"
            if [ "$actual" != "$V" ]; then
              echo "✗ $label = $actual (expected $V)"; fail=$((fail+1))
            fi
          }

          check "package.json .version"              "$(jq -r '.version' package.json)"
          for d in cli-darwin-arm64 cli-darwin-x64 cli-linux-arm64 cli-linux-x64; do
            check "optionalDep @compass-m/$d"         "$(jq -r ".optionalDependencies[\"@compass-m/$d\"]" package.json)"
          done
          check "core/manifest.json .version"        "$(jq -r '.version' core/manifest.json)"
          check "core/colleagues/manifest.json .version" "$(jq -r '.version' core/colleagues/manifest.json)"
          check "cli/Cargo.toml version"             "$(grep -E '^version = ' cli/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          check "cli/src/cmd/version.rs pin"         "$(grep -oE 'version_txt, \"[0-9]+\.[0-9]+\.[0-9]+\"' cli/src/cmd/version.rs | head -1 | sed 's/.*\"\(.*\)\"/\1/')"
          for p in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            check "npm/cli-$p/package.json"          "$(jq -r '.version' "npm/cli-$p/package.json")"
          done

          if [ "$fail" -eq 0 ]; then
            echo "✓ All 11 version refs match $V"
          else
            echo ""
            echo "$fail reference(s) out of sync. Run ./scripts/bump-version.sh $V locally, commit, retag."
            exit 1
          fi

  build:
    name: build (${{ matrix.platform }})
    needs: verify-versions
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs-on: macos-14
            platform: darwin-arm64
          - target: x86_64-apple-darwin
            runs-on: macos-14
            platform: darwin-x64
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
            platform: linux-x64
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-22.04-arm
            platform: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: cli
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary into platform package
        run: |
          cp cli/target/${{ matrix.target }}/release/compass-cli npm/cli-${{ matrix.platform }}/compass-cli
          chmod +x npm/cli-${{ matrix.platform }}/compass-cli

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: npm/cli-${{ matrix.platform }}/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm/

      - name: Restructure artifact dirs
        # download-artifact@v4 nests each artifact under its own name dir,
        # so npm/cli-<plat>/ may contain a duplicate cli-<plat>/ inside. Flatten.
        run: |
          set -euo pipefail
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            if [ -d "npm/cli-$plat/cli-$plat" ]; then
              mv npm/cli-$plat/cli-$plat/* npm/cli-$plat/
              rmdir npm/cli-$plat/cli-$plat
            fi
            echo "--- npm/cli-$plat ---"
            ls -la npm/cli-$plat/
            chmod +x npm/cli-$plat/compass-cli || true
          done

      - name: Publish 4 platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for plat in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "::group::publish cli-$plat"
            cd npm/cli-$plat
            npm publish --access public
            cd ../..
            echo "::endgroup::"
          done

      - name: Publish meta package (compass-m) last
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
